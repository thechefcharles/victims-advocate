name: Domain Validation

on:
  push:
    branches:
      - "domain/**"
      - "NXTSTPS2.0-V1"
  pull_request:
    branches:
      - "NXTSTPS2.0-V1"
      - "main"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: |
          npm test -- --passWithNoTests 2>&1 | tee test-output.txt
          TEST_COUNT=$(grep "Tests" test-output.txt | grep "passed" | sed 's/.*Tests  *//' | sed 's/ .*//' | head -1)
          TEST_COUNT=${TEST_COUNT:-0}
          echo "Test count: $TEST_COUNT"
          if [ "$TEST_COUNT" -lt "1100" ]; then
            echo "FAIL: Test count $TEST_COUNT is below minimum threshold (1100)"
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Trust signal isolation check
        run: |
          COUNT=0
          for dir in lib/server/grading lib/server/trust; do
            if [ -d "$dir" ]; then
              COUNT=$((COUNT + $(grep -r "from('cases')\|from(\"cases\")" "$dir" 2>/dev/null | wc -l)))
            fi
          done
          if [ "$COUNT" -gt "0" ]; then
            echo "FAIL: Trust signal coupling violation"
            exit 1
          fi
          echo "PASS: No trust signal coupling violations"

      - name: Search Law check
        run: |
          COUNT=0
          for dir in lib/server/recommendations lib/server/agency; do
            if [ -d "$dir" ]; then
              COUNT=$((COUNT + $(grep -r "from('cases')\|from(\"cases\")\|from('programs')\|from(\"programs\")" "$dir" 2>/dev/null | wc -l)))
            fi
          done
          if [ "$COUNT" -gt "0" ]; then
            echo "FAIL: Search Law violation — recommendations/agency querying ops tables"
            exit 1
          fi
          echo "PASS: Search Law compliant"

      - name: Migration timestamp check
        run: |
          FAIL=0
          for f in $(git diff --name-only origin/main HEAD -- 'supabase/migrations/*.sql' 2>/dev/null); do
            TS=$(basename "$f" | cut -c1-14)
            if [ "$TS" -lt "20260501000000" ]; then
              echo "FAIL: Migration $f timestamp before safe range"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq "1" ]; then exit 1; fi
          echo "PASS: Migration timestamps valid"
